<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSC Community Library</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        .resource { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .resource h3 { margin: 0 0 10px 0; color: #2c3e50; }
        .category { display: inline-block; background: #3498db; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .search-box { padding: 10px; width: 300px; margin: 20px 0; }
        button { padding: 10px 15px; background: #2ecc71; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📚 BOSC Community Library</h1>
    <p>Open educational resources for the community</p>

    <input type="text" id="searchInput" class="search-box" placeholder="Search resources...">
    <button onclick="searchResources()">Search</button>
    <button onclick="resetSearch()">Reset</button>

    <div id="resourcesContainer"></div>

    <script>
        // Resource database
        const resources = [
            { title: "Introduction to Python", category: "programming", url: "https://example.com/python", description: "Learn Python basics" },
            { title: "Web Development 101", category: "web", url: "https://example.com/web", description: "HTML, CSS, JavaScript fundamentals" },
            { title: "Data Science Handbook", category: "data", url: "https://example.com/data", description: "Statistics and machine learning" },
            { title: "Open Source Guide", category: "oss", url: "https://opensource.guide/", description: "How to contribute to open source" },
            { title: "Cybersecurity Basics", category: "security", url: "https://example.com/security", description: "Protect your digital life" }
        ];

        function displayResources(resourcesToShow) {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < resourcesToShow.length; i++) {
                const r = resourcesToShow[i];
                const div = document.createElement('div');
                div.className = 'resource';
                div.innerHTML = `
                    <h3>${r.title}</h3>
                    <span class="category">${r.category}</span>
                    <p>${r.description}</p>
                    <a href="${r.url}" target="_blank">Access Resource →</a>
                `;
                container.appendChild(div);
            }
        }

        function searchResources() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = resources.filter(r => 
                r.title.toLowerCase().includes(query) || 
                r.description.toLowerCase().includes(query)
            );
            displayResources(filtered);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            displayResources(resources);
        }

        // Initial display
        displayResources(resources);
    </script>
</body>
</html>
