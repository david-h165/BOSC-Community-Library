<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSC Community Library</title>

</head>
<body>
    <h1>📚 BOSC Community Library</h1>
    <p>Open educational resources for the community</p>

    <input type="text" id="searchInput" class="search-box" placeholder="Search resources...">
    <button onclick="searchResources()">Search</button>
    <button onclick="resetSearch()">Reset</button>
    <br><br>
<select id="categoryFilter" onchange="filterByCategory()">
    <option value="all">All Categories</option>
    <option value="programming">Programming</option>
    <option value="web">Web Development</option>
    <option value="data">Data Science</option>
    <option value="oss">Open Source</option>
    <option value="security">Cybersecurity</option>
</select>
    
<br><br>
<div id="resourceCount">Showing 5 of 5 resources</div>
    <div id="resourcesContainer"></div>

    <script>
        // Resource database
        const resources = [
            { title: "Introduction to Python", category: "programming", url: "https://example.com/python", description: "Learn Python basics" },
            { title: "Web Development 101", category: "web", url: "https://example.com/web", description: "HTML, CSS, JavaScript fundamentals" },
            { title: "Data Science Handbook", category: "data", url: "https://example.com/data", description: "Statistics and machine learning" },
            { title: "Open Source Guide", category: "oss", url: "https://opensource.guide/", description: "How to contribute to open source" },
            { title: "Cybersecurity Basics", category: "security", url: "https://example.com/security", description: "Protect your digital life" }
        ];

                       function filterByCategory() {
            const category = document.getElementById('categoryFilter').value;
            let filtered;
            if (category === 'all') {
                filtered = resources;
            } else {
                filtered = resources.filter(r => r.category === category);
            }
            displayResources(filtered);
        } 
               function updateCount(displayed, total) {
            const countElement = document.getElementById('resourceCount');
            if (countElement) {
                countElement.textContent = `Showing ${displayed} of ${total} resources`;
            }
        }
        function displayResources(resourcesToShow) {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < resourcesToShow.length; i++) {
                const r = resourcesToShow[i];
                const div = document.createElement('div');
                div.className = 'resource';
                div.innerHTML = `
                    <h3>${r.title}</h3>
                    <span class="category">${r.category}</span>
                    <p>${r.description}</p>
                    <a href="${r.url}" target="_blank">Access Resource →</a>
                `;
                container.appendChild(div);
            }
            updateCount(resourcesToShow.length, resources.length);
        
        }
        function searchResources() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            let categoryFiltered;
            if (category === 'all') {
                categoryFiltered = resources;
            } else {
                categoryFiltered = resources.filter(r => r.category === category);
            }
            
            let filtered;
            if (query === '') {
                filtered = categoryFiltered;
            } else {
                filtered = categoryFiltered.filter(r => 
                    r.title.toLowerCase().includes(query) || 
                    r.description.toLowerCase().includes(query)
                );
            }
            displayResources(filtered);
        }
          

              function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            displayResources(resources);
        }
</body>
</html>
